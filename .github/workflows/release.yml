name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out tag
        uses: actions/checkout@v4

      - name: Install release-gate dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            fuse-overlayfs \
            openssh-client \
            podman \
            shellcheck \
            slirp4netns \
            uidmap \
            wget \
            xauth \
            xvfb

          curl -fsSL \
            https://update.code.visualstudio.com/latest/linux-deb-x64/stable \
            -o /tmp/code.deb
          sudo apt-get install -y /tmp/code.deb

      - name: Verify toolchain
        run: |
          set -euo pipefail
          podman info
          ssh -V
          code --version

      - name: Lint
        run: scripts/lint.sh

      - name: Run full test suite
        env:
          JAILBOX_EDITOR_TIMEOUT: "60"
        run: xvfb-run -a tests/run-all.sh

  publish:
    runs-on: ubuntu-24.04
    needs: release-gate
    steps:
      - name: Check out tag
        uses: actions/checkout@v4

      - name: Build release tarball
        run: scripts/build-tarball.sh "${GITHUB_REF_NAME}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/jailbox-${{ github.ref_name }}.tar.gz
