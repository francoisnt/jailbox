name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release-gate:
    uses: ./.github/workflows/release-gate.yml

  publish:
    runs-on: ubuntu-24.04
    needs: release-gate
    steps:
      - name: Check out tag
        uses: actions/checkout@v5

      - name: Build release tarball
        run: scripts/build-tarball.sh "${GITHUB_REF_NAME}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/jailbox-${{ github.ref_name }}.tar.gz
            dist/jailbox-latest.tar.gz
            dist/SHA256SUMS
