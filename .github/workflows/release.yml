name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tag
        uses: actions/checkout@v4

      - name: Build release tarball
        run: scripts/build-tarball.sh "${GITHUB_REF_NAME}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/jailbox-${{ github.ref_name }}.tar.gz
