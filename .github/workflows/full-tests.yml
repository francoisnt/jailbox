name: Full Tests

on:
  workflow_dispatch:
  workflow_call:

jobs:
  core-tests:
    name: core tests
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up test environment
        uses: ./.github/actions/setup-test-env

      - name: Verify shellcheck
        run: shellcheck --version

      - name: Run core test suite
        run: tests/run-all.sh --skip-editor

  editor-smoke:
    name: editor smoke (${{ matrix.editor }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - editor: vscode
            editor_cli: code
          - editor: vscodium
            editor_cli: codium
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up test environment
        uses: ./.github/actions/setup-test-env

      - name: Install VS Code
        if: matrix.editor == 'vscode'
        run: |
          set -euo pipefail
          curl -fsSL \
            https://update.code.visualstudio.com/latest/linux-deb-x64/stable \
            -o /tmp/code.deb
          sudo apt-get install -y /tmp/code.deb
          code --install-extension ms-vscode-remote.remote-ssh --force

      - name: Install VSCodium
        if: matrix.editor == 'vscodium'
        run: |
          set -euo pipefail
          curl -fsSL \
            https://repo.vscodium.dev/vscodium.gpg \
            | gpg --dearmor \
            | sudo dd of=/usr/share/keyrings/vscodium.gpg
          sudo curl --output-dir /etc/apt/sources.list.d \
            -LO https://repo.vscodium.dev/vscodium.sources
          sudo apt-get update
          sudo apt-get install -y codium
          codium --install-extension jeanp413.open-remote-ssh --force

      - name: Verify editor install
        run: |
          set -euo pipefail
          case "${{ matrix.editor }}" in
            vscode)
              code --version
              code --list-extensions | grep -Fx ms-vscode-remote.remote-ssh
              ;;
            vscodium)
              codium --version
              codium --list-extensions | grep -Fx jeanp413.open-remote-ssh
              ;;
          esac

      - name: Build integration test images
        run: tests/integration/wrapper-images.sh

      - name: Run editor smoke
        env:
          JAILBOX_EDITOR: ${{ matrix.editor_cli }}
          JAILBOX_EDITOR_TIMEOUT: "60"
        run: xvfb-run -a tests/run-all.sh --editor-only
