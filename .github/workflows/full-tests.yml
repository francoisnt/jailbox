name: Full Tests

on:
  workflow_dispatch:
  workflow_call:

jobs:
  full-tests:
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            ca-certificates \
            curl \
            fuse-overlayfs \
            openssh-client \
            podman \
            shellcheck \
            slirp4netns \
            uidmap \
            wget \
            xauth \
            xvfb

          curl -fsSL \
            https://update.code.visualstudio.com/latest/linux-deb-x64/stable \
            -o /tmp/code.deb
          sudo apt-get install -y /tmp/code.deb

      - name: Verify toolchain
        run: |
          set -euo pipefail
          podman info
          ssh -V
          code --version

      - name: Lint
        run: scripts/lint.sh

      - name: Run full test suite
        env:
          JAILBOX_EDITOR_TIMEOUT: "60"
        run: xvfb-run -a tests/run-all.sh
