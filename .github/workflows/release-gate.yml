name: Release Gate

on:
  workflow_dispatch:
  workflow_call:

jobs:
  portable-smoke:
    name: portable smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Run portable smoke suite
        run: bash tests/portable/smoke.sh

  core-tests:
    name: core tests
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up host
        run: bash tests/ci/setup-linux.sh

      - name: Lint shell scripts
        run: bash scripts/lint.sh

      - name: Run core test suite
        run: bash tests/run --core-tests

  editor-smoke:
    name: editor smoke (${{ matrix.editor_cli }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        editor_cli:
          - code
          - codium
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up host with editors
        run: bash tests/ci/setup-linux.sh --with-editors

      - name: Build integration test images
        run: bash tests/integration/wrapper-images.sh

      - name: Run editor smoke
        env:
          JAILBOX_EDITOR: ${{ matrix.editor_cli }}
          JAILBOX_EDITOR_TIMEOUT: "60"
        run: bash tests/run --editor-smoke

      - name: Upload editor smoke logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: editor-smoke-logs-${{ matrix.editor_cli }}
          path: testlog/editor-*/
          retention-days: 7
