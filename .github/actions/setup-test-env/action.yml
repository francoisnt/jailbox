name: Setup test environment
description: >
  Install apt dependencies and verify the Podman/SSH toolchain shared by
  core-tests and editor-smoke. Add new packages here; they take effect in
  both jobs automatically.

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y \
          ca-certificates \
          curl \
          fuse-overlayfs \
          gnupg \
          openssh-client \
          podman \
          shellcheck \
          slirp4netns \
          uidmap \
          wget \
          xauth \
          xvfb

    - name: Verify toolchain
      shell: bash
      run: |
        set -euo pipefail
        podman info
        ssh -V
