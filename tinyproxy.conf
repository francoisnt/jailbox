Port 8888
Listen 0.0.0.0
Timeout 600
LogLevel Connect

# Filter file is mounted at runtime from the project's EGRESS_ALLOW list.
# Each line is a regex matched against the request host.
# FilterDefaultDeny blocks everything not explicitly listed.
Filter "/etc/tinyproxy/filter"
FilterDefaultDeny Yes
FilterURLs No

# Restrict CONNECT tunnels to port 443 only.
# Without explicit ConnectPort lines tinyproxy allows CONNECT to any port.
# Listing only 443 prevents tunnelling to SMTP, alternate-HTTP, or other ports.
ConnectPort 443

MaxClients 20
